<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback sent | WaveKit</title>
    <meta name="description" content="WaveKit feedback confirmation page for Wuthering Waves team helper reports, corrections, and player notes.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://wavekit.net/thanks/">
    <link rel="icon" href="assets/wavekit-mark.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <meta name="theme-color" content="#061827">
    <link rel="stylesheet" href="styles.css?v=release-20260718-4">
    <style>
      body { margin: 0; min-height: 100vh; color: #f3fbff; background: radial-gradient(circle at 50% 0%, rgba(120,244,255,.18), transparent 36%), #02080d; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .thanks-page { min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
      .thanks-card { width: min(620px, 100%); display: grid; gap: 14px; padding: clamp(24px, 5vw, 42px); border: 1px solid rgba(139,232,255,.18); border-radius: 8px; background: rgba(7,20,29,.92); box-shadow: 0 22px 58px rgba(0,0,0,.38); box-sizing: border-box; }
      .thanks-card img { width: 64px; height: 64px; border-radius: 12px; }
      .kicker { margin: 0; color: #ffd77a; font-size: .78rem; font-weight: 850; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(2.5rem, 7vw, 4.7rem); line-height: .95; }
      p:not(.kicker) { margin: 0; color: #c8e7ee; font-size: 1.05rem; line-height: 1.6; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; }
      .button { min-height: 42px; width: fit-content; display: inline-flex; align-items: center; justify-content: center; padding: 0 16px; border-radius: 8px; color: #031018; background: linear-gradient(135deg, #bdfcff, #62edff 48%, #ffd77a); text-decoration: none; font-weight: 780; }
      .button.secondary { color: #f3fbff; background: rgba(6,20,30,.78); border: 1px solid rgba(139,232,255,.28); }
    </style>
  </head>
  <body>
    <main class="thanks-page">
      <section class="thanks-card">
        <span class="brand-mark" aria-hidden="true">
          <img src="assets/wavekit-mark.png" alt="">
        </span>
        <p class="kicker">WaveKit feedback</p>
        <h1>Thank you.</h1>
        <p>
          Your report has been sent. Player notes are what will make WaveKit smarter, calmer, and more useful over time.
        </p>
        <p>
          For quick team discussion or follow-up notes, you can also join the WaveKit Discord.
        </p>
        <div class="actions">
          <a class="button primary" href="index.html#helper">Back to WaveKit</a>
          <a class="button secondary" href="https://discord.gg/wgGaqt6pvD" target="_blank" rel="noopener">Join Discord</a>
        </div>
      </section>
    </main>
  </body>
</html>
